name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: pnpm dist:win
            artifact_pattern: release/*.exe
            artifact_name: windows-release
          - os: ubuntu-latest
            command: pnpm dist:linux:appimage
            artifact_pattern: release/*.AppImage
            artifact_name: linux-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install runtime build dependencies
        run: python -m pip install -r scripts/requirements-runtime-build.txt

      - name: Build release package
        run: ${{ matrix.command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error
