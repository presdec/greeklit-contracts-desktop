name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: pnpm dist:win
            artifact_pattern: release/*.exe
            artifact_name: windows-release
          - os: ubuntu-latest
            command: pnpm dist:linux
            artifact_pattern: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.pacman
            artifact_name: linux-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install runtime build dependencies
        run: python -m pip install -r scripts/requirements-runtime-build.txt

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "const fs=require('fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); const t=process.env.GITHUB_REF_NAME||''; if (!t.startsWith('v')) { throw new Error('Expected tag starting with v'); } j.version=t.slice(1); fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n'); console.log('Set package version to', j.version);"

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build release package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  release-notes:
    name: Publish release notes
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Extract release notes
        run: node scripts/extract_release_notes.mjs "${GITHUB_REF_NAME}" > release-body.md

      - name: Update GitHub release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --notes-file release-body.md --title "${GITHUB_REF_NAME}"
